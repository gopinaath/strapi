AWSTemplateFormatVersion: '2010-09-09'
Description: 'AWS Secrets Manager configuration for Strapi environment variables'

Parameters:
  ProjectName:
    Type: String
    Default: strapi
    Description: Project name for resource naming
  
  Environment:
    Type: String
    Default: production
    AllowedValues:
      - dev
      - test
      - development
      - staging
      - production
    Description: Environment name

  DatabaseUsername:
    Type: String
    Default: strapiuser
    Description: Database username for Strapi
    NoEcho: true

Resources:
  # Database Password Secret
  DBPasswordSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: !Sub ${ProjectName}-${Environment}-db-password
      Description: Database password for Strapi PostgreSQL
      GenerateSecretString:
        SecretStringTemplate: !Sub |
          {
            "username": "${DatabaseUsername}"
          }
        GenerateStringKey: password
        PasswordLength: 32
        ExcludeCharacters: '"@\/\\'
        RequireEachIncludedType: true
      KmsKeyId: alias/aws/secretsmanager
      Tags:
        - Key: Name
          Value: !Sub ${ProjectName}-${Environment}-db-password

  # Application Secrets
  AppSecrets:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: !Sub ${ProjectName}-${Environment}-app-secrets
      Description: Application secrets for Strapi
      SecretString: !Sub |
        {
          "APP_KEYS": "${AppKey1},${AppKey2},${AppKey3},${AppKey4}",
          "API_TOKEN_SALT": "${APITokenSalt}",
          "ADMIN_JWT_SECRET": "${AdminJWTSecret}",
          "TRANSFER_TOKEN_SALT": "${TransferTokenSalt}",
          "JWT_SECRET": "${JWTSecret}",
          "ENCRYPTION_KEY": "${EncryptionKey}"
        }
      KmsKeyId: alias/aws/secretsmanager
      Tags:
        - Key: Name
          Value: !Sub ${ProjectName}-${Environment}-app-secrets

  # Rotation Lambda Role
  SecretRotationLambdaRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub ${ProjectName}-${Environment}-secret-rotation-role
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: SecretRotationPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - secretsmanager:DescribeSecret
                  - secretsmanager:GetSecretValue
                  - secretsmanager:PutSecretValue
                  - secretsmanager:UpdateSecretVersionStage
                Resource:
                  - !Ref DBPasswordSecret
                  - !Ref AppSecrets
              - Effect: Allow
                Action:
                  - secretsmanager:GetRandomPassword
                Resource: '*'
              - Effect: Allow
                Action:
                  - ec2:CreateNetworkInterface
                  - ec2:DeleteNetworkInterface
                  - ec2:DescribeNetworkInterfaces
                  - ec2:DetachNetworkInterface
                Resource: '*'

  # Resource Policy for Cross-Service Access
  DBPasswordSecretResourcePolicy:
    Type: AWS::SecretsManager::ResourcePolicy
    Properties:
      SecretId: !Ref DBPasswordSecret
      ResourcePolicy:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - rds.amazonaws.com
                - ecs-tasks.amazonaws.com
            Action:
              - secretsmanager:GetSecretValue
            Resource: '*'
            Condition:
              StringEquals:
                secretsmanager:VersionStage: AWSCURRENT

  AppSecretsResourcePolicy:
    Type: AWS::SecretsManager::ResourcePolicy
    Properties:
      SecretId: !Ref AppSecrets
      ResourcePolicy:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action:
              - secretsmanager:GetSecretValue
            Resource: '*'
            Condition:
              StringEquals:
                secretsmanager:VersionStage: AWSCURRENT

  # CloudWatch Alarms
  SecretRotationFailureAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub ${ProjectName}-${Environment}-secret-rotation-failure
      AlarmDescription: Secret rotation has failed
      MetricName: RotationFailed
      Namespace: AWS/SecretsManager
      Statistic: Sum
      Period: 3600
      EvaluationPeriods: 1
      Threshold: 1
      ComparisonOperator: GreaterThanOrEqualToThreshold
      Dimensions:
        - Name: SecretName
          Value: !Ref DBPasswordSecret
      TreatMissingData: notBreaching

  # Custom Resource for Initial Secret Values
  SecretGeneratorLambda:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub ${ProjectName}-${Environment}-secret-generator
      Runtime: python3.9
      Handler: index.handler
      Role: !GetAtt SecretGeneratorRole.Arn
      Timeout: 60
      Code:
        ZipFile: |
          import json
          import secrets
          import string
          import boto3
          import cfnresponse

          def generate_key(length=32):
              alphabet = string.ascii_letters + string.digits + '-_'
              return ''.join(secrets.choice(alphabet) for i in range(length))

          def handler(event, context):
              try:
                  if event['RequestType'] == 'Create':
                      response_data = {
                          'AppKey1': generate_key(32),
                          'AppKey2': generate_key(32),
                          'AppKey3': generate_key(32),
                          'AppKey4': generate_key(32),
                          'APITokenSalt': generate_key(16),
                          'AdminJWTSecret': generate_key(32),
                          'TransferTokenSalt': generate_key(16),
                          'JWTSecret': generate_key(32),
                          'EncryptionKey': generate_key(32)
                      }
                      cfnresponse.send(event, context, cfnresponse.SUCCESS, response_data)
                  else:
                      cfnresponse.send(event, context, cfnresponse.SUCCESS, {})
              except Exception as e:
                  print(e)
                  cfnresponse.send(event, context, cfnresponse.FAILED, {})

  SecretGeneratorRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole

  GenerateSecrets:
    Type: Custom::SecretGenerator
    Properties:
      ServiceToken: !GetAtt SecretGeneratorLambda.Arn

  # Parameters for secret values
  AppKey1:
    Type: AWS::SSM::Parameter
    Properties:
      Name: !Sub /${ProjectName}/${Environment}/temp/AppKey1
      Type: String
      Value: !GetAtt GenerateSecrets.AppKey1

  AppKey2:
    Type: AWS::SSM::Parameter
    Properties:
      Name: !Sub /${ProjectName}/${Environment}/temp/AppKey2
      Type: String
      Value: !GetAtt GenerateSecrets.AppKey2

  AppKey3:
    Type: AWS::SSM::Parameter
    Properties:
      Name: !Sub /${ProjectName}/${Environment}/temp/AppKey3
      Type: String
      Value: !GetAtt GenerateSecrets.AppKey3

  AppKey4:
    Type: AWS::SSM::Parameter
    Properties:
      Name: !Sub /${ProjectName}/${Environment}/temp/AppKey4
      Type: String
      Value: !GetAtt GenerateSecrets.AppKey4

  APITokenSalt:
    Type: AWS::SSM::Parameter
    Properties:
      Name: !Sub /${ProjectName}/${Environment}/temp/APITokenSalt
      Type: String
      Value: !GetAtt GenerateSecrets.APITokenSalt

  AdminJWTSecret:
    Type: AWS::SSM::Parameter
    Properties:
      Name: !Sub /${ProjectName}/${Environment}/temp/AdminJWTSecret
      Type: String
      Value: !GetAtt GenerateSecrets.AdminJWTSecret

  TransferTokenSalt:
    Type: AWS::SSM::Parameter
    Properties:
      Name: !Sub /${ProjectName}/${Environment}/temp/TransferTokenSalt
      Type: String
      Value: !GetAtt GenerateSecrets.TransferTokenSalt

  JWTSecret:
    Type: AWS::SSM::Parameter
    Properties:
      Name: !Sub /${ProjectName}/${Environment}/temp/JWTSecret
      Type: String
      Value: !GetAtt GenerateSecrets.JWTSecret

  EncryptionKey:
    Type: AWS::SSM::Parameter
    Properties:
      Name: !Sub /${ProjectName}/${Environment}/temp/EncryptionKey
      Type: String
      Value: !GetAtt GenerateSecrets.EncryptionKey

Outputs:
  DBPasswordSecretArn:
    Description: ARN of the database password secret
    Value: !Ref DBPasswordSecret
    Export:
      Name: !Sub ${ProjectName}-${Environment}-DBPasswordSecretArn

  AppSecretsArn:
    Description: ARN of the application secrets
    Value: !Ref AppSecrets
    Export:
      Name: !Sub ${ProjectName}-${Environment}-AppSecretsArn

  DBPasswordSecretName:
    Description: Name of the database password secret
    Value: !Ref DBPasswordSecret
    Export:
      Name: !Sub ${ProjectName}-${Environment}-DBPasswordSecretName

  AppSecretsName:
    Description: Name of the application secrets
    Value: !Ref AppSecrets
    Export:
      Name: !Sub ${ProjectName}-${Environment}-AppSecretsName